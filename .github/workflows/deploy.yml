name: Build & Deploy to GitHub Pages

# Runs on every push to main (and can be triggered manually).
# It regenerates responsive image variants, optionally rebuilds the gallery
# data from Google Drive, then publishes the site to GitHub Pages.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # refresh notices/tenders & redeploy every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Optional. Add a repo secret named GALLERY_DRIVE_API_KEY to enable the
      # Google Drive import step. If it's empty, that step is skipped.
      GALLERY_DRIVE_API_KEY: ${{ secrets.GALLERY_DRIVE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pillow

      - name: Generate responsive image variants
        run: python3 optimize_images.py

      - name: Build gallery data from Google Drive (optional)
        if: ${{ env.GALLERY_DRIVE_API_KEY != '' }}
        run: python3 build_gallery_from_drive.py

      - name: Build notices & tenders from Google Drive (optional)
        if: ${{ env.GALLERY_DRIVE_API_KEY != '' }}
        run: python3 build_notices_from_drive.py

      - name: Build Latest News carousel from Google Drive (optional)
        if: ${{ env.GALLERY_DRIVE_API_KEY != '' }}
        run: python3 build_latestnews_from_drive.py

      - name: Build Research Highlights from Google Drive (optional)
        if: ${{ env.GALLERY_DRIVE_API_KEY != '' }}
        run: python3 build_research_highlights_from_drive.py

      - name: Clear sample notices when Drive is not configured
        if: ${{ env.GALLERY_DRIVE_API_KEY == '' }}
        run: |
          printf '%s\n' \
            '// No Drive key configured — notices/tenders intentionally empty.' \
            'window.NOTICES_DATA = [];' \
            'window.TENDERS_DATA = [];' > notices-data.js
          printf '%s\n' \
            '// No Drive key configured — Latest News intentionally empty.' \
            'window.LATEST_NEWS_DATA = [];' > latestnews-data.js
          printf '%s\n' \
            '// No Drive key configured — Research Highlights intentionally empty.' \
            'window.RESEARCH_HIGHLIGHTS_DATA = [];' > research-highlights-data.js

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='*.py' \
            --exclude='*.sh' \
            --exclude='IMAGES_SETUP.md' \
            --exclude='faculty_photos_manifest.csv' \
            --exclude='faculty-photo-filenames.txt' \
            ./ _site/
          touch _site/.nojekyll
          echo "Published files:"; ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
