<html lang="en">
<head>
<meta charset="UTF-8" />

<title>GCETTS · Government College of Engineering &amp; Textile Technology, Serampore</title>
<meta name="description" content="Government College of Engineering and Textile Technology, Serampore (GCETTS) — established 1908, India's oldest textile engineering institute. B.Tech &amp; M.Tech programmes in Textile Technology, Computer Science, Information Technology and Apparel Production Management. Affiliated to MAKAUT, approved by AICTE." />

<!-- React + Babel (no build step; deploys directly to GitHub Pages) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Notices & Tenders feed (data files are optional / auto-generated) -->
<script src="drive-feed.js"></script>
<script src="notices-data.js"></script>
<script src="latestnews-data.js"></script>

<script src="drive-config.js"></script>

<!-- Type system: heritage serif + engineering sans + utility mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --indigo-950:#0E1B33;
  --indigo-900:#14233F;
  --indigo-800:#1B2E50;
  --indigo-700:#243B65;
  --indigo-600:#2C4878;
  --thread:#6E8BBE;          /* light woven thread */
  --ecru:#F4EFE4;            /* raw cotton */
  --paper:#FBF9F4;          /* page surface */
  --paper-dim:#F1ECE0;
  --gold:#D8A33B;           /* turmeric / marigold dye */
  --gold-deep:#B9842A;
  --ink:#1A1A17;
  --ink-soft:#56524A;
  --line:#E2DBCC;
  --max:1200px;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
ul{list-style:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}

.wrap{max-width:var(--max);margin:0 auto;padding:0 20px}
.mono{font-family:'Spline Sans Mono',monospace}
.serif{font-family:'Fraunces',Georgia,serif}

.eyebrow{
  font-family:'Spline Sans Mono',monospace;
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold-deep);font-weight:500;
  display:inline-flex;align-items:center;gap:.6em;
}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.eyebrow.on-dark{color:var(--gold)}

/* skip link */
.skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:#fff;padding:12px 18px;border-radius:0 0 8px 0}
.skip:focus{left:0}

/* ============ TOP UTILITY BAR ============ */
.topbar{background:var(--indigo-950);color:#cfd8ea;font-size:.78rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;min-height:38px;flex-wrap:wrap}
.topbar .tb-left{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.topbar a{display:inline-flex;gap:6px;align-items:center;opacity:.85;transition:opacity .2s}
.topbar a:hover{opacity:1;color:var(--gold)}
.topbar .pill{background:var(--gold);color:var(--indigo-950);padding:3px 11px;border-radius:999px;font-weight:700;font-family:'Spline Sans Mono',monospace;letter-spacing:.04em}

/* ============ HEADER / NAV ============ */
.header{position:sticky;top:0;z-index:120;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:74px}
.brand{display:flex;align-items:center;gap:13px}
.crest{width:46px;height:46px;flex:0 0 auto}
.brand-logo{height:42px;width:auto;flex:0 0 auto;object-fit:contain}
@media(max-width:520px){.brand-logo{height:34px}}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:1.06rem;line-height:1.05;letter-spacing:-.01em;display:block;color:var(--indigo-900)}
.brand-txt span{font-family:'Spline Sans Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
.navlinks{display:none;align-items:center;gap:4px}
.navlinks a{font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;color:var(--ink);transition:background .2s,color .2s}
.navlinks a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-cta{display:none;background:var(--indigo-800);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.84rem;transition:background .2s,transform .2s}
.nav-cta:hover{background:var(--gold);color:var(--indigo-950);transform:translateY(-1px)}
/* desktop dropdown */
.nav-dd{position:relative}
.nav-dd-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--ink);cursor:pointer;transition:background .2s,color .2s}
.nav-dd:hover .nav-dd-btn,.nav-dd:focus-within .nav-dd-btn{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-btn svg{transition:transform .2s}
.nav-dd:hover .nav-dd-btn svg,.nav-dd:focus-within .nav-dd-btn svg{transform:rotate(180deg)}
.nav-dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:248px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 18px 44px -16px rgba(20,35,63,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s;z-index:50}
.nav-dd:hover .nav-dd-menu,.nav-dd:focus-within .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-menu a{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:500;color:var(--ink);white-space:nowrap}
.nav-dd-menu a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-menu a.dd-head{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;border-bottom:1px solid var(--line);border-radius:0;margin-bottom:4px}
.nav-dd-menu .ext{color:var(--gold-deep);font-size:.8rem}
/* mobile accordion button */
.acc-btn{display:flex;width:100%;justify-content:space-between;align-items:center;padding:13px 6px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);font-family:inherit;font-size:1rem;color:var(--ink);cursor:pointer}
.acc-btn span{font-family:'Spline Sans Mono',monospace;color:var(--gold-deep);font-size:1.2rem;width:20px;text-align:center}
.burger{display:inline-flex;flex-direction:column;gap:5px;background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer}
.burger span{width:20px;height:2px;background:var(--indigo-900);border-radius:2px;transition:.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:1024px){
  .navlinks{display:flex}.nav-cta{display:inline-block}.burger{display:none}
}
/* mobile drawer */
.drawer{overflow:hidden;max-height:0;transition:max-height .35s ease;background:var(--paper);border-bottom:1px solid var(--line)}
.drawer.open{max-height:560px}
.drawer ul{padding:8px 20px 22px}
.drawer a{display:block;padding:13px 6px;font-weight:600;border-bottom:1px solid var(--line);color:var(--ink)}
.drawer .sub a{padding-left:22px;font-weight:500;color:var(--ink-soft);font-size:.92rem}
.drawer .d-cta{margin-top:16px;text-align:center;background:var(--indigo-800);color:#fff;border-radius:999px;border:none}

/* ============ HERO ============ */
.hero{position:relative;background:var(--indigo-900);color:#fff;overflow:hidden}
.hero-weave{position:absolute;inset:0;opacity:.5;pointer-events:none}
.hero-glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(216,163,59,.20),transparent 65%);top:-180px;right:-120px;pointer-events:none}
.hero .wrap{position:relative;padding:64px 20px 78px;display:grid;gap:42px}
.hero-h1{font-family:'Fraunces',serif;font-weight:600;line-height:1.02;letter-spacing:-.02em;font-size:clamp(2.5rem,7vw,5.1rem)}
.hero-h1 em{font-style:italic;color:var(--gold)}
.hero-lead{color:#c7d2e8;max-width:46ch;font-size:1.07rem;margin-top:22px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:32px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:14px 24px;border-radius:999px;font-weight:700;font-size:.92rem;transition:transform .2s,background .2s,box-shadow .2s;cursor:pointer;border:none}
.btn-gold{background:var(--gold);color:var(--indigo-950);box-shadow:0 10px 30px -10px rgba(216,163,59,.6)}
.btn-gold:hover{transform:translateY(-2px);background:#e6b34d}
.btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.hero-meta{display:flex;gap:26px;flex-wrap:wrap;margin-top:40px;padding-top:26px;border-top:1px solid rgba(255,255,255,.14)}
.hero-meta div b{font-family:'Fraunces',serif;font-size:1.7rem;display:block;color:#fff}
.hero-meta div span{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0}
.hero-est{font-family:'Spline Sans Mono',monospace;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px}
.hero-est::before,.hero-est::after{content:"";height:1px;width:34px;background:linear-gradient(90deg,transparent,var(--gold))}
.hero-est::before{background:linear-gradient(90deg,var(--gold),transparent)}
@media(min-width:880px){
  .hero .wrap{grid-template-columns:1.15fr .85fr;align-items:center;padding:84px 20px 96px}
}

/* loom card in hero */
.loom{position:relative;background:linear-gradient(160deg,var(--indigo-800),var(--indigo-700));border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:30px;overflow:hidden}
.loom h3{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.loom-row{display:flex;justify-content:space-between;align-items:baseline;padding:13px 0;border-bottom:1px dashed rgba(255,255,255,.14)}
.loom-row:last-child{border-bottom:none}
.loom-row span{color:#bcccea;font-size:.9rem}
.loom-row b{font-family:'Fraunces',serif;font-size:1.15rem}
.loom-row b small{font-family:'Spline Sans Mono',monospace;font-size:.6rem;color:var(--gold);letter-spacing:.1em;margin-left:6px}

/* ============ NOTICE TICKER ============ */
.ticker{background:var(--ink);color:#fff;display:flex;align-items:stretch;overflow:hidden}
.ticker-tag{background:var(--gold);color:var(--indigo-950);font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;padding:0 18px;white-space:nowrap;flex:0 0 auto}
.ticker-track{display:flex;gap:48px;align-items:center;white-space:nowrap;padding:11px 0;animation:scroll 28s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker:hover .ticker-track{animation-play-state:paused}
@media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}
.ticker-track a{font-size:.84rem;color:#e7e7e2;display:inline-flex;gap:9px;align-items:center}
.ticker-track a:hover{color:var(--gold)}
.ticker-track .dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.ticker-track.still{animation:none;padding-left:0}
.tk-badge{font-family:'Spline Sans Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:2px 7px;border-radius:999px}
.tk-badge.n{background:rgba(216,163,59,.22);color:var(--gold)}
.tk-badge.t{background:rgba(110,139,190,.28);color:#cfe0ff}
.tk-date{font-family:'Spline Sans Mono',monospace;font-size:.66rem;color:#9aa6c0}
.ticker-all{flex:0 0 auto;display:flex;align-items:center;padding:0 16px;font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.08em;color:var(--gold);border-left:1px solid rgba(255,255,255,.12)}
.ticker-all:hover{color:#fff}
/* Latest News carousel */
.latest{padding:62px 0 14px;background:var(--paper)}
.latest-head{margin-bottom:8px}
.latest-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.8rem,4vw,2.6rem);color:var(--indigo-900);letter-spacing:-.015em;margin-top:10px}
.latest-head .ln-rule{height:3px;width:62px;background:var(--gold);border-radius:2px;margin-top:14px}
.ln-viewport{overflow:hidden;padding:26px 0 60px;-webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent)}
.ln-track{display:flex;gap:18px;width:max-content;padding:0 20px;animation:lnscroll 48s linear infinite}
.ln-track.still{animation:none}
@keyframes lnscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ln-viewport:hover .ln-track{animation-play-state:paused}
.ln-card{position:relative;width:340px;height:230px;flex:0 0 auto;border:none;padding:0;margin:0;font:inherit;color:inherit;text-align:left;cursor:zoom-in;border-radius:16px;overflow:hidden;background:var(--indigo-800);box-shadow:0 16px 36px -22px rgba(20,35,63,.55)}
.ln-card:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
.ln-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease}
.ln-card:hover img{transform:scale(1.06)}
.ln-ph{position:absolute;inset:0;background:linear-gradient(150deg,var(--indigo-800),var(--indigo-600))}
.ln-ph svg{position:absolute;inset:0;width:100%;height:100%}
.ln-cap{position:absolute;left:0;right:0;bottom:0;padding:36px 16px 15px;color:#fff;font-weight:700;font-size:1rem;line-height:1.25;background:linear-gradient(transparent,rgba(14,27,51,.9));display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:560px){.ln-card{width:280px;height:190px}}
@media (prefers-reduced-motion:reduce){.ln-track{animation:none;overflow-x:auto;-webkit-overflow-scrolling:touch}.ln-viewport{-webkit-mask-image:none;mask-image:none}}
/* Latest News lightbox */
.ln-lightbox{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(14,27,51,.86);backdrop-filter:blur(6px);cursor:zoom-out;animation:lnfade .2s ease}
@keyframes lnfade{from{opacity:0}to{opacity:1}}
.ln-figure{margin:0;max-width:1100px;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;animation:lnpop .24s cubic-bezier(.2,.8,.25,1)}
@keyframes lnpop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.ln-figure img{max-width:100%;max-height:80vh;width:auto;height:auto;border-radius:14px;box-shadow:0 30px 80px -28px rgba(0,0,0,.7);display:block}
.ln-figure .ln-ph-big{width:min(92vw,760px);height:min(60vh,500px);position:relative;border-radius:14px;overflow:hidden;background:linear-gradient(150deg,var(--indigo-800),var(--indigo-600))}
.ln-figure figcaption{color:#fff;font-family:'Fraunces',serif;font-size:1.15rem;text-align:center;max-width:60ch;padding:0 10px}
.ln-close{position:fixed;top:18px;right:22px;width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:1.8rem;line-height:1;cursor:pointer;transition:background .2s,transform .2s}
.ln-close:hover{background:var(--gold);color:var(--indigo-950);border-color:var(--gold);transform:rotate(90deg)}
@media (prefers-reduced-motion:reduce){.ln-lightbox,.ln-figure{animation:none}.ln-close:hover{transform:none}}

/* ============ SECTION BASE ============ */
section{padding:74px 0}
.sec-head{max-width:60ch;margin-bottom:46px}
.sec-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.9rem,4.4vw,3rem);line-height:1.06;letter-spacing:-.015em;margin-top:14px;color:var(--indigo-900)}
.sec-head p{color:var(--ink-soft);margin-top:16px;font-size:1.04rem}

.selvedge{height:14px;background-image:repeating-linear-gradient(90deg,var(--gold) 0 2px,transparent 2px 9px);opacity:.5}

/* ============ STATS STRIP ============ */
.stats{background:var(--ecru);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stats .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line)}
.stat{background:var(--ecru);padding:30px 22px;text-align:center}
.stat b{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2rem,5vw,2.9rem);color:var(--indigo-800);display:block;letter-spacing:-.02em}
.stat span{font-family:'Spline Sans Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px;display:block}
@media(min-width:760px){.stats .grid{grid-template-columns:repeat(4,1fr)}}

/* ============ ABOUT + TIMELINE ============ */
.about{background:var(--paper)}
.about-grid{display:grid;gap:48px}
.about-prose p{color:var(--ink-soft);margin-bottom:16px;font-size:1.05rem}
.about-prose .lead{font-family:'Fraunces',serif;font-size:1.3rem;color:var(--ink);line-height:1.45}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:repeating-linear-gradient(var(--gold) 0 5px,transparent 5px 11px)}
.tl-item{position:relative;padding:0 0 26px 6px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:"";position:absolute;left:-29px;top:5px;width:13px;height:13px;border-radius:50%;background:var(--paper);border:2.5px solid var(--gold)}
.tl-year{font-family:'Spline Sans Mono',monospace;font-weight:600;color:var(--indigo-700);font-size:.94rem}
.tl-item p{color:var(--ink-soft);font-size:.96rem;margin-top:3px}
@media(min-width:920px){.about-grid{grid-template-columns:1.05fr .95fr;align-items:start}}

/* ============ DEPARTMENTS ============ */
.depts{background:var(--indigo-950);color:#fff;position:relative;overflow:hidden}
.depts .weave-bg{position:absolute;inset:0;opacity:.4}
.depts .sec-head h2{color:#fff}
.depts .sec-head p{color:#aebbd6}
.dept-grid{display:grid;gap:18px;position:relative}
.dept-card{background:linear-gradient(165deg,var(--indigo-800),var(--indigo-900));border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:28px;transition:transform .25s,border-color .25s;display:flex;flex-direction:column;min-height:230px}
.dept-card:hover{transform:translateY(-5px);border-color:var(--gold)}
.dept-code{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;color:var(--gold);font-weight:600}
.dept-card h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;margin:12px 0 10px;line-height:1.12}
.dept-card p{color:#b3c0db;font-size:.92rem;flex-grow:1}
.dept-foot{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.12)}
.dept-foot .lvl{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.1em;color:#8fa1c4;text-transform:uppercase}
.dept-foot .go{color:var(--gold);font-weight:700;font-size:.84rem;display:inline-flex;gap:6px;align-items:center;transition:gap .2s}
.dept-card:hover .go{gap:11px}
@media(min-width:680px){.dept-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1040px){.dept-grid{grid-template-columns:repeat(4,1fr)}}

/* ============ PRINCIPAL ============ */
.principal{background:var(--ecru)}
.prin-grid{display:grid;gap:36px;align-items:center}
.prin-card{background:var(--indigo-900);color:#fff;border-radius:20px;padding:34px;position:relative;overflow:hidden}
.prin-card .quote{font-family:'Fraunces',serif;font-style:italic;font-size:1.32rem;line-height:1.5;color:#eef2fa}
.prin-card .by{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.12em;color:var(--gold);margin-top:18px;text-transform:uppercase}
.prin-mark{position:absolute;font-family:'Fraunces',serif;font-size:9rem;color:rgba(216,163,59,.16);top:-10px;left:18px;line-height:1}
.prin-body p{color:var(--ink-soft);margin-bottom:15px;font-size:1.04rem}
.prin-sign{display:flex;align-items:center;gap:14px;margin-top:24px}
.prin-avatar{width:54px;height:54px;border-radius:50%;background:var(--indigo-800);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:1.2rem;flex:0 0 auto}

/* ============ VISION / MISSION ============ */

/* ============ CAMPUS / FEST ============ */

function Weave({ id, opacity }) {
  return (

        </pattern>

      <rect width="800" height="600" fill={`url(#${id})`} />
    </svg>
  );
}

/* scroll reveal hook */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
      els.forEach(e=>e.classList.add('in'));return;
    }
    const io=new IntersectionObserver((en)=>{
      en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
    },{threshold:.12});
    els.forEach(e=>io.observe(e));
    return ()=>io.disconnect();
  },[]);
}

function Ticker(){
  const [items,setItems]=useState(null); // null = loading
  useEffect(()=>{
    let on=true;
    const p = (window.DriveFeed ? window.DriveFeed.load() : Promise.resolve({notices:[],tenders:[]}));
    p.then(d=>{
      if(!on) return;
      const n=(d.notices||[]).slice(0,3).map(x=>({...x,tag:"Notice"}));
      const t=(d.tenders||[]).slice(0,1).map(x=>({...x,tag:"Tender"}));
      setItems([...n,...t]);
    }).catch(()=>{ if(on) setItems([]); });
    return ()=>{on=false;};
  },[]);

  if(!items || items.length===0) return null;   // nothing to show -> hide entirely
  const fmt=(iso)=>{ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":d.toLocaleDateString(undefined,{day:"numeric",month:"short"}); };
  const loop = items.length>1 ? [...items,...items] : items;

  return (
    <div className="ticker" role="region" aria-label="Latest notices and tenders">
      <div className="ticker-tag">● Latest</div>
      <div style={{overflow:"hidden",flex:1}}>
        <div className={"ticker-track"+(items.length>1?"":" still")}>
          {loop.map((n,i)=>(
            <a key={i} href={n.url} target="_blank" rel="noopener">
              <span className={"tk-badge "+(n.tag==="Tender"?"t":"n")}>{n.tag}</span>
              {n.name}
              {n.date && <span className="tk-date">{fmt(n.date)}</span>}
            </a>
          ))}
        </div>
      </div>
      <a className="ticker-all" href="notices.html">All ↗</a>
    </div>
  );
}

function LNImg({photo}){
  const [err,setErr]=useState(false);
  if(err || !photo.url) return (
    <div className="ln-ph">
      <svg viewBox="0 0 120 120" preserveAspectRatio="none" aria-hidden="true">
        <defs><pattern id="lnw" width="16" height="16" patternUnits="userSpaceOnUse">
          <path d="M0 0H16M0 5H16M0 10H16" stroke="rgba(216,163,59,.30)" strokeWidth="1"/>
          <path d="M0 0V16M5 0V16M10 0V16" stroke="rgba(255,255,255,.10)" strokeWidth="1"/>
        </pattern></defs><rect width="120" height="120" fill="url(#lnw)"/>
      </svg>
    </div>
  );
  return <img src={photo.url} srcSet={photo.srcset||undefined} sizes="340px" loading="lazy" decoding="async" alt={photo.cap||"Latest news"} onError={()=>setErr(true)} />;
}

function LatestNews(){
  const [items,setItems]=useState(null);
  const [active,setActive]=useState(null); // enlarged photo or null
  useEffect(()=>{
    let on=true;
    const p = (window.DriveFeed ? window.DriveFeed.load() : Promise.resolve({latestNews:[]}));
    p.then(d=>{ if(on) setItems(d.latestNews||[]); }).catch(()=>{ if(on) setItems([]); });
    return ()=>{on=false;};
  },[]);
  useEffect(()=>{
    if(!active) return;
    const onKey=(e)=>{ if(e.key==="Escape") setActive(null); };
    document.addEventListener("keydown",onKey);
    document.body.style.overflow="hidden";
    return ()=>{ document.removeEventListener("keydown",onKey); document.body.style.overflow=""; };
  },[active]);
  if(!items || items.length===0) return null;   // no images -> section hidden
  const loop = items.length>1 ? [...items,...items] : items;
  return (
    <section className="latest" id="latest" aria-label="Latest News">
      <div className="wrap">
        <div className="latest-head reveal">
          <span className="eyebrow">In focus</span>
          <h2>Latest News</h2>
          <div className="ln-rule"></div>
        </div>
      </div>
      <div className="ln-viewport">
        <div className={"ln-track"+(items.length>1?"":" still")}>
          {loop.map((p,i)=>(
            <button className="ln-card" key={i} type="button" onClick={()=>setActive(p)} aria-label={"Enlarge: "+(p.cap||"image")}>
              <LNImg photo={p}/>
              {p.cap && <span className="ln-cap">{p.cap}</span>}
            </button>
          ))}
        </div>
      </div>
      {active && (
        <div className="ln-lightbox" onClick={()=>setActive(null)} role="dialog" aria-modal="true" aria-label={active.cap||"Image"}>
          <button className="ln-close" type="button" aria-label="Close">&times;</button>
          <figure className="ln-figure" onClick={()=>setActive(null)}>
            {active.url
              ? <img src={active.url} srcSet={active.srcset||undefined} sizes="92vw" alt={active.cap||"Latest news"} />
              : <div className="ln-ph ln-ph-big"><svg viewBox="0 0 120 120" preserveAspectRatio="none" aria-hidden="true"><rect width="120" height="120" fill="url(#lnw)"/></svg></div>}
            {active.cap && <figcaption>{active.cap}</figcaption>}
          </figure>
        </div>
      )}
    </section>
  );
}
