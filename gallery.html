<html lang="en">
<head>

<title>Gallery · GCETTS — Government College of Engineering &amp; Textile Technology, Serampore</title>
<meta name="description" content="Photo gallery of campus life, events and festivals at Government College of Engineering and Textile Technology, Serampore (GCETTS)." />

<style>
:root{
  --indigo-950:#0E1B33;--indigo-900:#14233F;--indigo-800:#1B2E50;--indigo-700:#243B65;--indigo-600:#2C4878;
  --thread:#6E8BBE;--ecru:#F4EFE4;--paper:#FBF9F4;--paper-dim:#F1ECE0;--gold:#D8A33B;--gold-deep:#B9842A;
  --ink:#1A1A17;--ink-soft:#56524A;--line:#E2DBCC;--max:1200px;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
ul{list-style:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}
.wrap{max-width:var(--max);margin:0 auto;padding:0 20px}
.mono{font-family:'Spline Sans Mono',monospace}
.eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:500;display:inline-flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.eyebrow.on-dark{color:var(--gold)}
.skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:#fff;padding:12px 18px;border-radius:0 0 8px 0}
.skip:focus{left:0}

/* topbar + header (shared) */
.topbar{background:var(--indigo-950);color:#cfd8ea;font-size:.78rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;min-height:38px;flex-wrap:wrap}
.topbar .tb-left{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.topbar a{display:inline-flex;gap:6px;align-items:center;opacity:.85;transition:opacity .2s}
.topbar a:hover{opacity:1;color:var(--gold)}
.topbar .pill{background:var(--gold);color:var(--indigo-950);padding:3px 11px;border-radius:999px;font-weight:700;font-family:'Spline Sans Mono',monospace;letter-spacing:.04em}
.header{position:sticky;top:0;z-index:120;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:74px}
.brand{display:flex;align-items:center;gap:13px}
.crest{width:46px;height:46px;flex:0 0 auto}
.brand-logo{height:42px;width:auto;flex:0 0 auto;object-fit:contain}
@media(max-width:520px){.brand-logo{height:34px}}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:1.06rem;line-height:1.05;letter-spacing:-.01em;display:block;color:var(--indigo-900)}
.brand-txt span{font-family:'Spline Sans Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
.navlinks{display:none;align-items:center;gap:4px}
.navlinks a{font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;color:var(--ink);transition:background .2s,color .2s}
.navlinks a:hover,.navlinks a.active{background:var(--ecru);color:var(--indigo-800)}
.nav-cta{display:none;background:var(--indigo-800);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.84rem;transition:background .2s,transform .2s}
.nav-cta:hover{background:var(--gold);color:var(--indigo-950);transform:translateY(-1px)}
.nav-dd{position:relative}
.nav-dd-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--ink);cursor:pointer;transition:background .2s,color .2s}
.nav-dd:hover .nav-dd-btn,.nav-dd:focus-within .nav-dd-btn{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-btn svg{transition:transform .2s}
.nav-dd:hover .nav-dd-btn svg,.nav-dd:focus-within .nav-dd-btn svg{transform:rotate(180deg)}
.nav-dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:248px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 18px 44px -16px rgba(20,35,63,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s;z-index:50}
.nav-dd:hover .nav-dd-menu,.nav-dd:focus-within .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-menu a{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:500;color:var(--ink);white-space:nowrap}
.nav-dd-menu a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-menu .ext{color:var(--gold-deep);font-size:.8rem}
.burger{display:inline-flex;flex-direction:column;gap:5px;background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer}
.burger span{width:20px;height:2px;background:var(--indigo-900);border-radius:2px;transition:.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:1024px){.navlinks{display:flex}.nav-cta{display:inline-block}.burger{display:none}}
.drawer{overflow:hidden;max-height:0;transition:max-height .35s ease;background:var(--paper);border-bottom:1px solid var(--line)}
.drawer.open{max-height:640px;overflow-y:auto}
.drawer ul{padding:8px 20px 22px}
.drawer a{display:block;padding:13px 6px;font-weight:600;border-bottom:1px solid var(--line);color:var(--ink)}
.drawer .sub a{padding-left:22px;font-weight:500;color:var(--ink-soft);font-size:.92rem}
.drawer .d-cta{margin-top:16px;text-align:center;background:var(--indigo-800);color:#fff;border-radius:999px;border:none}
.acc-btn{display:flex;width:100%;justify-content:space-between;align-items:center;padding:13px 6px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);font-family:inherit;font-size:1rem;color:var(--ink);cursor:pointer}
.acc-btn span{font-family:'Spline Sans Mono',monospace;color:var(--gold-deep);font-size:1.2rem;width:20px;text-align:center}

/* ===== gallery hero ===== */
.ghero{position:relative;background:var(--indigo-900);color:#fff;overflow:hidden;padding:58px 0 64px}
.ghero .weave-bg{position:absolute;inset:0;opacity:.45}
.ghero .glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(216,163,59,.18),transparent 65%);top:-220px;right:-120px}
.ghero .wrap{position:relative}
.crumb{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0;margin-bottom:16px}
.crumb a:hover{color:var(--gold)}
.ghero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.3rem,6vw,4rem);line-height:1.03;letter-spacing:-.02em}
.ghero h1 em{font-style:italic;color:var(--gold)}
.ghero p{color:#c7d2e8;max-width:54ch;margin-top:16px;font-size:1.05rem}
.ghero-stats{display:flex;gap:30px;flex-wrap:wrap;margin-top:30px;padding-top:22px;border-top:1px solid rgba(255,255,255,.14)}
.ghero-stats div b{font-family:'Fraunces',serif;font-size:1.6rem;display:block}
.ghero-stats div span{font-family:'Spline Sans Mono',monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0}

/* ===== filter bar ===== */
.gbar{position:sticky;top:74px;z-index:40;background:rgba(251,249,244,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 0}
.gbar .wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.chip{font-family:'Hanken Grotesk',sans-serif;font-size:.8rem;font-weight:600;padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.2s;white-space:nowrap;display:inline-flex;gap:7px;align-items:center}
.chip:hover{border-color:var(--gold)}
.chip.on{background:var(--indigo-800);color:#fff;border-color:var(--indigo-800)}
.chip .n{font-family:'Spline Sans Mono',monospace;font-size:.66rem;opacity:.7}

/* ===== featured ===== */
.feat{padding:42px 0 8px}
.feat-card{position:relative;border-radius:22px;overflow:hidden;min-height:300px;display:flex;align-items:flex-end;color:#fff;background:var(--indigo-800);cursor:pointer}
.feat-card .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.feat-card .ph{position:absolute;inset:0}
.feat-card .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,27,51,.15) 0%,rgba(14,27,51,.85) 100%)}
.feat-card .meta{position:relative;padding:30px}
.feat-card .tag{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;gap:8px}
.feat-card h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.05;margin:10px 0 6px}
.feat-card p{color:#d6deee;max-width:52ch;font-size:.96rem}
.feat-card .open{margin-top:14px;display:inline-flex;gap:8px;align-items:center;font-weight:700;font-size:.86rem;color:#fff}

/* ===== event blocks ===== */
.events{padding:34px 0 70px}
.eblock{margin-bottom:50px;scroll-margin-top:160px}
.ehead{display:flex;align-items:baseline;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.ehead h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.4rem,3.2vw,2rem);color:var(--indigo-900);letter-spacing:-.01em}
.ehead .date{font-family:'Spline Sans Mono',monospace;font-size:.74rem;color:var(--gold-deep);letter-spacing:.06em}
.ehead .rule{flex:1;height:1px;min-width:30px;background:repeating-linear-gradient(90deg,var(--gold) 0 2px,transparent 2px 9px);opacity:.45}
.eblock .blurb{color:var(--ink-soft);max-width:70ch;margin-bottom:20px;font-size:.98rem}

/* masonry */
.masonry{column-count:2;column-gap:14px}
@media(min-width:680px){.masonry{column-count:3}}
@media(min-width:1000px){.masonry{column-count:4}}
.tile{break-inside:avoid;width:100%;margin:0 0 14px;border:none;padding:0;background:none;cursor:zoom-in;border-radius:14px;overflow:hidden;display:block;position:relative;box-shadow:0 2px 0 rgba(20,35,63,0);transition:transform .25s,box-shadow .25s}
.tile:hover{transform:translateY(-3px);box-shadow:0 18px 36px -20px rgba(20,35,63,.5)}
.tile img{width:100%;height:auto;display:block;transition:transform .5s}
.tile:hover img{transform:scale(1.05)}
.tile .cap{position:absolute;left:0;right:0;bottom:0;padding:18px 12px 10px;font-size:.78rem;color:#fff;text-align:left;background:linear-gradient(transparent,rgba(14,27,51,.8));opacity:0;transition:opacity .25s;font-weight:600}
.tile:hover .cap{opacity:1}
/* placeholder tile */
.ph{position:relative;width:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);overflow:hidden}
.ph svg.weave{position:absolute;inset:0;width:100%;height:100%;opacity:.5}
.ph .pi{position:relative;text-align:center;font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.1em}
.ph .pi svg{margin:0 auto 8px;opacity:.85}

/* ===== lightbox ===== */
.lb{position:fixed;inset:0;z-index:300;background:rgba(7,14,28,.94);backdrop-filter:blur(6px);display:flex;flex-direction:column;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.lb-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;color:#cfd8ea;flex:0 0 auto}
.lb-count{font-family:'Spline Sans Mono',monospace;font-size:.8rem;letter-spacing:.1em}
.lb-x{background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-x:hover{background:var(--gold);color:var(--indigo-950)}
.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:0 12px;min-height:0}
.lb-stage img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 30px 80px -20px rgba(0,0,0,.7)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:50px;height:50px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-nav:hover{background:var(--gold);color:var(--indigo-950)}
.lb-prev{left:14px}.lb-next{right:14px}
.lb-cap{flex:0 0 auto;text-align:center;color:#c7d2e8;padding:16px 20px 26px;font-size:.92rem}
.lb-cap b{color:var(--gold);font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:4px}
@media(max-width:600px){.lb-nav{width:42px;height:42px}}

/* featured card is now a <button> */
.feat-card{border:none;text-align:left;font:inherit;width:100%}
.feat-card .meta{display:block}
.feat-card .tag{display:inline-flex}
.feat-card .h2{display:block;font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.05;margin:10px 0 6px}
.feat-card .p{display:block;color:#d6deee;max-width:52ch;font-size:.96rem}

/* album landing grid */
.albums{padding:30px 0 70px}
.album-grid{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:560px){.album-grid{grid-template-columns:1fr 1fr}}
@media(min-width:980px){.album-grid{grid-template-columns:1fr 1fr 1fr}}
.album{position:relative;border:none;padding:0;text-align:left;font:inherit;border-radius:18px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:var(--indigo-800);color:#fff;display:block;box-shadow:0 2px 0 rgba(20,35,63,0);transition:transform .25s,box-shadow .25s}
.album:hover{transform:translateY(-4px);box-shadow:0 22px 44px -22px rgba(20,35,63,.55)}
.album .cov{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s}
.album:hover .cov{transform:scale(1.06)}
.album .phc{position:absolute;inset:0}
.album .sc{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,27,51,.05) 35%,rgba(14,27,51,.85) 100%)}
.album .m{position:absolute;left:0;right:0;bottom:0;padding:18px;display:block}
.album .m .t{display:block;font-family:'Fraunces',serif;font-weight:600;font-size:1.18rem;line-height:1.12}
.album .m .d{display:flex;gap:8px;align-items:center;font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;margin-top:7px}
.album .m .d .star{color:var(--gold)}
.album .count-badge{position:absolute;top:12px;right:12px;background:rgba(14,27,51,.55);backdrop-filter:blur(4px);color:#fff;font-family:'Spline Sans Mono',monospace;font-size:.64rem;padding:5px 10px;border-radius:999px}

/* album view */
.albview{padding:24px 0 70px}
.backbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.backbtn{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-family:inherit;font-weight:600;font-size:.84rem;cursor:pointer;color:var(--ink);transition:.2s}
.backbtn:hover{border-color:var(--gold);color:var(--indigo-800)}
.albnav{display:flex;gap:8px}

/* footer (shared) */
.footer{background:var(--indigo-950);color:#aebbd6;padding:60px 0 0}
.foot-top{display:grid;gap:34px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.1)}
.foot-brand .brand-txt b{color:#fff}
.foot-brand p{margin-top:16px;font-size:.9rem;max-width:34ch}
.foot-col h4{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.foot-col a{display:block;padding:6px 0;font-size:.9rem;transition:color .2s}
.foot-col a:hover{color:#fff}
.foot-bottom{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:24px 0;font-size:.8rem;color:#7e8db0}
@media(min-width:760px){.foot-top{grid-template-columns:1.6fr 1fr 1fr 1fr}}

.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.tile:hover img{transform:none}}
</style>
</head>

/* ---- responsive image resolution ----
   Returns {src, srcset, cap}.
   • Google Drive  -> Google generates any width on the fly (srcset always on)
   • local files   -> uses <stem>-<w>.<ext> variants IF you ran optimize_images.py
                      (enable by setting window.GALLERY_RESPONSIVE_LOCAL = true)
*/
const DRIVE_WIDTHS = [400,800,1280,1600];
const LOCAL_WIDTHS = [400,800,1280];
const SIZES_TILE  = "(min-width:1000px) 23vw, (min-width:680px) 31vw, 47vw";
const SIZES_ALBUM = "(min-width:980px) 32vw, (min-width:560px) 48vw, 94vw";
const driveUrl = (id,w)=>`https://drive.google.com/thumbnail?id=${id}&sz=w${w}`;

function resolve(ref, displayW){
  displayW = displayW || 1280;
  if (typeof ref === "string"){
    let srcset = null;
    const m = ref.match(/^(.*)\.(jpe?g|png|webp)$/i);
    if (RESPONSIVE_LOCAL && m){
      srcset = LOCAL_WIDTHS.map(w=>`${m[1]}-${w}.${m[2]} ${w}w`).join(", ");
    }
    return { src: ref, srcset, cap: "" };
  }
  if (ref.drive){
    return {
      src: driveUrl(ref.drive, displayW),
      srcset: DRIVE_WIDTHS.map(w=>`${driveUrl(ref.drive,w)} ${w}w`).join(", "),
      cap: ref.cap || ""
    };
  }
  return { src: ref.src, srcset: ref.srcset || null, cap: ref.cap || "" };
}

/* aspect ratios for placeholder variety */
const RATIOS=[ "4 / 5","1 / 1","4 / 3","3 / 4","16 / 11","1 / 1","5 / 4" ];

function Tile({photo, i, onOpen}){
  const [err,setErr]=useState(false);
  const r=RATIOS[i % RATIOS.length];
  const [c1,c2]=[["#1B2E50","#243B65"],["#243B65","#2C4878"],["#14233F","#1B2E50"]][i%3];
  return (
    <button className="tile reveal" onClick={onOpen} aria-label={photo.cap||("Photo "+(i+1))}>
      {!err
        ? <img src={photo.src} srcSet={photo.srcset||undefined} sizes={SIZES_TILE} loading="lazy" decoding="async" alt={photo.cap||""} onError={()=>setErr(true)} />
        : <div className="ph" style={{aspectRatio:r,background:`linear-gradient(150deg,${c1},${c2})`}}>
            <PlaceholderWeave/>
            <div className="pi">{Ico.cam()}<div>PHOTO {String(i+1).padStart(2,'0')}</div></div>
          </div>}
      {photo.cap && <span className="cap">{photo.cap}</span>}
    </button>
  );
}

function Lightbox({photos, index, onClose, onNav}){
  const cur=photos[index];
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.key==="Escape") onClose();
      else if(e.key==="ArrowRight") onNav(1);
      else if(e.key==="ArrowLeft") onNav(-1);
    };
    window.addEventListener("keydown",onKey);
    document.body.style.overflow="hidden";
    return ()=>{window.removeEventListener("keydown",onKey);document.body.style.overflow="";};
  },[onClose,onNav]);
  // swipe
  const tx=React.useRef(0);
  return (
    <div className="lb" onClick={onClose} role="dialog" aria-modal="true" aria-label="Image viewer">
      <div className="lb-top" onClick={e=>e.stopPropagation()}>
        <span className="lb-count">{index+1} / {photos.length}</span>
        <button className="lb-x" onClick={onClose} aria-label="Close">×</button>
      </div>
      <div className="lb-stage"
        onClick={e=>e.stopPropagation()}
        onTouchStart={e=>tx.current=e.touches[0].clientX}
        onTouchEnd={e=>{const d=e.changedTouches[0].clientX-tx.current; if(Math.abs(d)>50) onNav(d<0?1:-1);}}>
        {photos.length>1 && <button className="lb-nav lb-prev" onClick={()=>onNav(-1)} aria-label="Previous">{Ico.left()}</button>}
        <img src={cur.src} alt={cur.cap||""} />
        {photos.length>1 && <button className="lb-nav lb-next" onClick={()=>onNav(1)} aria-label="Next">{Ico.right()}</button>}
      </div>
      <div className="lb-cap" onClick={e=>e.stopPropagation()}>
        <b>{cur.event}</b>{cur.cap || "Tap arrows or use ← → keys · Esc to close"}
      </div>
    </div>
  );
}

function AlbumCard({ev, onOpen}){
  const cov = resolve(ev.cover || ev.photos[0], 800);
  const [err,setErr]=useState(false);
  const [c1,c2]=[["#1B2E50","#243B65"],["#243B65","#2C4878"],["#14233F","#1B2E50"]][ev.id.length%3];
  return (
    <button className="album reveal" onClick={onOpen} aria-label={ev.title}>
      {!err
        ? <img className="cov" src={cov.src} srcSet={cov.srcset||undefined} sizes={SIZES_ALBUM} loading="lazy" decoding="async" alt="" onError={()=>setErr(true)} />
        : <div className="phc" style={{background:`linear-gradient(150deg,${c1},${c2})`}}><PlaceholderWeave/></div>}
      <span className="sc"></span>
      <span className="count-badge">{ev.photos.length} photos</span>
      <span className="m">
        <span className="t">{ev.title}</span>
        <span className="d">{ev.featured && <span className="star">★</span>}{ev.date}</span>
      </span>
    </button>
  );
}
