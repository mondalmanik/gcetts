<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research News · GCETTS — Government College of Engineering &amp; Textile Technology, Serampore</title>
<meta name="description" content="Research news, thrust areas and newsletters from Government College of Engineering and Textile Technology, Serampore (GCETTS)." />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Optional override: define window.RESEARCH_DATA = [ {title,year,url,kind}, ... ] -->
<script src="research-data.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --indigo-950:#0E1B33;--indigo-900:#14233F;--indigo-800:#1B2E50;--indigo-700:#243B65;--indigo-600:#2C4878;
  --thread:#6E8BBE;--ecru:#F4EFE4;--paper:#FBF9F4;--paper-dim:#F1ECE0;--gold:#D8A33B;--gold-deep:#B9842A;
  --ink:#1A1A17;--ink-soft:#56524A;--line:#E2DBCC;--max:1200px;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
ul{list-style:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}
.wrap{max-width:var(--max);margin:0 auto;padding:0 20px}
.mono{font-family:'Spline Sans Mono',monospace}
.eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:500;display:inline-flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.eyebrow.on-dark{color:var(--gold)}
.skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:#fff;padding:12px 18px;border-radius:0 0 8px 0}
.skip:focus{left:0}
.topbar{background:var(--indigo-950);color:#cfd8ea;font-size:.78rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;min-height:38px;flex-wrap:wrap}
.topbar .tb-left{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.topbar a{display:inline-flex;gap:6px;align-items:center;opacity:.85;transition:opacity .2s}
.topbar a:hover{opacity:1;color:var(--gold)}
.topbar .pill{background:var(--gold);color:var(--indigo-950);padding:3px 11px;border-radius:999px;font-weight:700;font-family:'Spline Sans Mono',monospace;letter-spacing:.04em}
.header{position:sticky;top:0;z-index:120;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:74px}
.brand{display:flex;align-items:center;gap:13px}
.crest{width:46px;height:46px;flex:0 0 auto}
.brand-logo{height:42px;width:auto;flex:0 0 auto;object-fit:contain}
@media(max-width:520px){.brand-logo{height:34px}}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:1.06rem;line-height:1.05;letter-spacing:-.01em;display:block;color:var(--indigo-900)}
.brand-txt span{font-family:'Spline Sans Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
.navlinks{display:none;align-items:center;gap:4px}
.navlinks a{font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;color:var(--ink);transition:background .2s,color .2s}
.navlinks a:hover,.navlinks a.active{background:var(--ecru);color:var(--indigo-800)}
.nav-cta{display:none;background:var(--indigo-800);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.84rem;transition:background .2s,transform .2s}
.nav-cta:hover{background:var(--gold);color:var(--indigo-950);transform:translateY(-1px)}
.nav-dd{position:relative}
.nav-dd-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--ink);cursor:pointer;transition:background .2s,color .2s}
.nav-dd:hover .nav-dd-btn,.nav-dd:focus-within .nav-dd-btn{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-btn svg{transition:transform .2s}
.nav-dd:hover .nav-dd-btn svg,.nav-dd:focus-within .nav-dd-btn svg{transform:rotate(180deg)}
.nav-dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:260px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 18px 44px -16px rgba(20,35,63,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s;z-index:50}
.nav-dd:hover .nav-dd-menu,.nav-dd:focus-within .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-menu a{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:500;color:var(--ink);white-space:nowrap}
.nav-dd-menu a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-menu .ext{color:var(--gold-deep);font-size:.8rem}
.burger{display:inline-flex;flex-direction:column;gap:5px;background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer}
.burger span{width:20px;height:2px;background:var(--indigo-900);border-radius:2px;transition:.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:1024px){.navlinks{display:flex}.nav-cta{display:inline-block}.burger{display:none}}
.drawer{overflow:hidden;max-height:0;transition:max-height .35s ease;background:var(--paper);border-bottom:1px solid var(--line)}
.drawer.open{max-height:640px;overflow-y:auto}
.drawer ul{padding:8px 20px 22px}
.drawer a{display:block;padding:13px 6px;font-weight:600;border-bottom:1px solid var(--line);color:var(--ink)}
.drawer .sub a{padding-left:22px;font-weight:500;color:var(--ink-soft);font-size:.92rem}
.drawer .d-cta{margin-top:16px;text-align:center;background:var(--indigo-800);color:#fff;border-radius:999px;border:none}
.acc-btn{display:flex;width:100%;justify-content:space-between;align-items:center;padding:13px 6px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);font-family:inherit;font-size:1rem;color:var(--ink);cursor:pointer}
.acc-btn span{font-family:'Spline Sans Mono',monospace;color:var(--gold-deep);font-size:1.2rem;width:20px;text-align:center}
/* hero */
.rhero{position:relative;background:var(--indigo-900);color:#fff;overflow:hidden;padding:54px 0 56px}
.rhero .weave-bg{position:absolute;inset:0;opacity:.42}
.rhero .glow{position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(216,163,59,.18),transparent 65%);top:-210px;right:-110px}
.rhero .wrap{position:relative}
.crumb{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0;margin-bottom:14px}
.crumb a:hover{color:var(--gold)}
.rhero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.2rem,5.4vw,3.5rem);line-height:1.04;letter-spacing:-.02em}
.rhero h1 em{font-style:italic;color:var(--gold)}
.rhero p{color:#c7d2e8;max-width:60ch;margin-top:14px;font-size:1.04rem}
/* sections */
section{padding:56px 0}
.sec-head{max-width:62ch;margin-bottom:34px}
.sec-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.7rem,3.6vw,2.3rem);line-height:1.08;color:var(--indigo-900);margin-top:12px;letter-spacing:-.01em}
.sec-head p{color:var(--ink-soft);margin-top:14px;font-size:1.04rem}
/* thrust cards */
.tcards{display:grid;gap:18px}
@media(min-width:720px){.tcards{grid-template-columns:1fr 1fr}}
.tcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;transition:transform .25s,border-color .25s}
.tcard:hover{transform:translateY(-4px);border-color:var(--gold)}
.tcard .code{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;color:var(--gold-deep);font-weight:600}
.tcard h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;color:var(--indigo-900);margin:8px 0 14px}
.taglist{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:var(--ecru);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:.82rem;font-weight:600;color:var(--indigo-800)}
/* issues (newsletter) */
.issues{background:var(--ecru);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.feed-list{display:flex;flex-direction:column;gap:10px}
.frow{display:flex;gap:15px;align-items:center;padding:16px 18px;border:1px solid var(--line);border-radius:14px;background:#fff;transition:transform .2s,border-color .2s,box-shadow .2s}
.frow:hover{transform:translateX(3px);border-color:var(--gold);box-shadow:0 14px 30px -20px rgba(20,35,63,.4)}
.ficon{width:46px;height:46px;border-radius:11px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Spline Sans Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.04em;background:linear-gradient(145deg,#B23A2E,#8E2A20)}
.fmeta{flex:1;min-width:0}
.fmeta .t{font-weight:600;color:var(--indigo-900);font-size:1rem;line-height:1.25;display:block}
.fmeta .d{font-family:'Spline Sans Mono',monospace;font-size:.7rem;color:var(--ink-soft);margin-top:4px}
.fopen{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);color:var(--indigo-800);font-weight:700;font-size:.82rem;padding:9px 15px;border-radius:999px;transition:.2s}
.fopen:hover{background:var(--gold);border-color:var(--gold);color:var(--indigo-950)}
.state{text-align:center;padding:50px 20px;color:var(--ink-soft)}
.state b{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--indigo-900);display:block;margin-bottom:6px}
/* footer */
.footer{background:var(--indigo-950);color:#aebbd6;padding:60px 0 0}
.foot-top{display:grid;gap:34px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.1)}
.foot-brand .brand-txt b{color:#fff}
.foot-brand p{margin-top:16px;font-size:.9rem;max-width:34ch}
.foot-col h4{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.foot-col a{display:block;padding:6px 0;font-size:.9rem;transition:color .2s}
.foot-col a:hover{color:#fff}
.foot-bottom{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:24px 0;font-size:.8rem;color:#7e8db0}
@media(min-width:760px){.foot-top{grid-template-columns:1.6fr 1fr 1fr 1fr}}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* Research newsletters / issues. Add new ones at the top (newest first).
   Each: { title, year, url, kind:"pdf"|"doc"|... }.
   You may also override from research-data.js via window.RESEARCH_DATA. */
const DEFAULT_ISSUES = [
  { title:"Research News — Issue 2025", year:"2025", url:"https://drive.google.com/file/d/1lS_7osmgw6yn3488IINrEoY9kAzf-s-e/view?usp=sharing", kind:"pdf" },
];
const ISSUES = (typeof window!=="undefined" && window.RESEARCH_DATA && window.RESEARCH_DATA.length) ? window.RESEARCH_DATA : DEFAULT_ISSUES;

const THRUST = [
  { code:"CSE", name:"Computer Science & Engineering",
    areas:["Computational Intelligence & Information Systems","Artificial Intelligence","Data Science","Networks & Internet of Things (IoT)"] },
  { code:"TT", name:"Textile Technology",
    areas:["Mechanical Processing of Textiles","Chemical Processing of Textiles","Fundamental & Applied Textile Research","Industry–Institute Collaboration"] },
  { code:"IT", name:"Information Technology",
    areas:["Networking & Communication","Software Systems","Multimedia & Graphics","Data & Databases"] },
  { code:"APM", name:"Apparel Production Management",
    areas:["Apparel Manufacturing Technology","Quality Management","Merchandising & Work Study","IT & Artificial Intelligence"] },
];

const DEPT_LINKS = [
  { label:"Computer Science & Engg. (CSE)", href:"departments.html?d=cse" },
  { label:"Information Technology (IT)", href:"departments.html?d=it" },
  { label:"Textile Technology (TT)", href:"departments.html?d=tt" },
  { label:"Apparel Production Mgmt. (APM)", href:"departments.html?d=apm" },
  { label:"All Departments", href:"departments.html" },
];
const MORE_LINKS = [
  { label:"Notices & Tenders", href:"notices.html" },
  { label:"Research News", href:"research.html" },
  { label:"Grievance Redressal", href:"https://docs.google.com/forms/d/e/1FAIpQLSdkeo-BajebDNM2stkQoeycfOr7VeJg7p6dFdUEFU-qEcYaPw/viewform", ext:true },
  { label:"E-magazine", href:"https://www.gcetts.ac.in/e-magazine", ext:true },
  { label:"AICTE EOA Reports", href:"https://drive.google.com/drive/folders/1fwgXa0EDTmuvWOG9Cj9W_0rtc5ZknU6D?usp=sharing", ext:true },
  { label:"Anti Ragging", href:"https://drive.google.com/file/d/1KWXbm0YFWtOaYugpUSLzTMPNDcxwK43V/view?usp=sharing", ext:true },
  { label:"NIRF", href:"https://drive.google.com/file/d/1BOHoAtYIDRr2wKsBuVjY6SV4sKOqBXTB/view?usp=sharing", ext:true },
];
const Ico={
  mail:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" strokeWidth="2"/><path d="M4 7l8 6 8-6" stroke="currentColor" strokeWidth="2"/></svg>,
  phone:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 4h4l2 5-3 2a12 12 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/></svg>,
  open:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M14 4h6v6M20 4l-9 9M19 14v5a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1h5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  flask:()=><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M9 3h6M10 3v6l-5 8a2 2 0 002 3h10a2 2 0 002-3l-5-8V3" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>,
};
function Crest(){return(
  <svg className="crest" viewBox="0 0 64 64" aria-hidden="true">
    <circle cx="32" cy="32" r="30" fill="#14233F"/><circle cx="32" cy="32" r="30" fill="none" stroke="#D8A33B" strokeWidth="1.5"/>
    <g stroke="#6E8BBE" strokeWidth="1.4"><path d="M18 22v20M26 22v20M38 22v20M46 22v20"/></g>
    <g stroke="#D8A33B" strokeWidth="1.8"><path d="M14 28h36M14 36h36"/></g>
    <path d="M32 12l3 5h-6l3-5z" fill="#D8A33B"/>
  </svg>);}
function Weave({opacity}){return(
  <svg className="weave-bg" preserveAspectRatio="none" viewBox="0 0 800 600" aria-hidden="true" style={{opacity}}>
    <defs><pattern id="rw" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 0 H40 M0 13 H40 M0 26 H40" stroke="rgba(110,139,190,.5)" strokeWidth="1"/>
      <path d="M0 0 V40 M13 0 V40 M26 0 V40" stroke="rgba(216,163,59,.28)" strokeWidth="1"/>
    </pattern></defs><rect width="800" height="600" fill="url(#rw)"/>
  </svg>);}
function BrandLogos(){return(
  <a className="brand" href="index.html" aria-label="GCETTS home">
    <img className="brand-logo" src="logo-left.png" alt="" onError={e=>{e.currentTarget.style.display='none';}} />
    <span className="brand-txt"><b>GCETTS</b><span>Serampore · Est. 1908</span></span>
    <img className="brand-logo" src="logo-right.png" alt="" onError={e=>{e.currentTarget.style.display='none';}} />
  </a>);}
function Dropdown({label, items}){return(
  <div className="nav-dd">
    <button className="nav-dd-btn" aria-haspopup="true">{label}
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </button>
    <div className="nav-dd-menu" role="menu">
      {items.map(it=><a key={it.label} href={it.href} role="menuitem" target={it.ext?"_blank":undefined} rel={it.ext?"noopener":undefined}>{it.label}{it.ext && <span className="ext">↗</span>}</a>)}
    </div>
  </div>);}
function Header(){
  const [open,setOpen]=useState(false);
  const [acc,setAcc]=useState(null);
  const tog=(k)=>setAcc(acc===k?null:k);
  return (
    <React.Fragment>
      <div className="topbar"><div className="wrap">
        <div className="tb-left"><span className="mono">Affiliated to MAKAUT · Approved by AICTE</span></div>
        <div className="tb-left">
          <a href="mailto:info@gcetts.ac.in">{Ico.mail()} info@gcetts.ac.in</a>
          <a href="tel:+9103326621058">{Ico.phone()} (033) 2662-1058</a>
          <a className="pill" href="https://drive.google.com/file/d/1Vf__yZqNDXnj7tXz9Ue7HqfpBkcwgKub/view?usp=sharing" target="_blank" rel="noopener">Prospectus ↗</a>
        </div>
      </div></div>
      <header className="header"><div className="wrap">
        <nav className="nav" aria-label="Primary">
          <BrandLogos/>
          <div className="navlinks">
            <a href="index.html#home">Home</a>
            <a href="index.html#institute">Institute</a>
            <Dropdown label="Departments" items={DEPT_LINKS}/>
            <a href="faculty.html">Faculty</a>
            <a href="gallery.html">Gallery</a>
            <a href="research.html" className="active">Research</a>
            <Dropdown label="More" items={MORE_LINKS}/>
            <a href="contact.html">Contact</a>
          </div>
          <a className="nav-cta" href="#issues">Latest issue</a>
          <button className={"burger"+(open?" open":"")} aria-label="Toggle menu" aria-expanded={open} onClick={()=>setOpen(!open)}><span></span><span></span><span></span></button>
        </nav>
      </div>
      <div className={"drawer"+(open?" open":"")}>
        <ul>
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#institute">Institute</a></li>
          <li><button className="acc-btn" aria-expanded={acc==='dept'} onClick={()=>tog('dept')}>Departments <span>{acc==='dept'?'–':'+'}</span></button></li>
          {acc==='dept' && <li className="sub">{DEPT_LINKS.map(d=><a key={d.label} href={d.href}>{d.label}</a>)}</li>}
          <li><a href="faculty.html">Faculty</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="research.html">Research News</a></li>
          <li><button className="acc-btn" aria-expanded={acc==='more'} onClick={()=>tog('more')}>More <span>{acc==='more'?'–':'+'}</span></button></li>
          {acc==='more' && <li className="sub">{MORE_LINKS.map(m=><a key={m.label} href={m.href} target={m.ext?"_blank":undefined} rel={m.ext?"noopener":undefined}>{m.label}</a>)}</li>}
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
      </header>
    </React.Fragment>
  );
}
function Footer(){return(
  <footer className="footer"><div className="wrap">
    <div className="foot-top">
      <div className="foot-brand">
        <div className="brand"><Crest/><span className="brand-txt"><b style={{color:"#fff"}}>GCETTS</b><span>Serampore · Est. 1908</span></span></div>
        <p>Government College of Engineering &amp; Textile Technology, Serampore. Affiliated to MAKAUT, approved by AICTE.</p>
      </div>
      <div className="foot-col"><h4>Departments</h4>
        <a href="departments.html?d=cse">Computer Science &amp; Engg.</a>
        <a href="departments.html?d=it">Information Technology</a>
        <a href="departments.html?d=tt">Textile Technology</a>
        <a href="departments.html?d=apm">Apparel Production Mgmt.</a>
      </div>
      <div className="foot-col"><h4>Institute</h4>
        <a href="index.html#institute">About &amp; History</a>
        <a href="faculty.html">Faculty</a>
        <a href="gallery.html">Gallery</a>
        <a href="research.html">Research News</a>
      </div>
      <div className="foot-col"><h4>Resources</h4>
        <a href="notices.html">Notices &amp; Tenders</a>
        <a href="https://drive.google.com/file/d/1BOHoAtYIDRr2wKsBuVjY6SV4sKOqBXTB/view?usp=sharing" target="_blank" rel="noopener">NIRF</a>
        <a href="https://www.gcetts.ac.in/e-magazine" target="_blank" rel="noopener">E-magazine</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
    <div className="foot-bottom">
      <span>© {new Date().getFullYear()} Government College of Engineering and Textile Technology, Serampore. All rights reserved.</span>
      <span className="mono">Serampore · Hooghly · West Bengal</span>
    </div>
  </div></footer>);}

function App(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){els.forEach(e=>e.classList.add('in'));return;}
    const io=new IntersectionObserver(en=>en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.06});
    els.forEach(e=>io.observe(e));return ()=>io.disconnect();
  },[]);
  return (
    <React.Fragment>
      <a className="skip" href="#main">Skip to content</a>
      <Header/>
      <section className="rhero" style={{padding:0}}>
        <div style={{padding:"54px 0 56px",position:"relative"}}>
        <Weave opacity={.4}/><div className="glow"></div>
        <div className="wrap">
          <div className="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Research News</div>
          <span className="eyebrow on-dark">Research &amp; Innovation</span>
          <h1>Research <em>news</em>.</h1>
          <p>Across textiles, computing and apparel, GCETTS departments pursue fundamental and applied research — supported by qualified faculty, industry–institute collaboration and a strong alumni network.</p>
        </div>
        </div>
      </section>

      <main id="main">
        <section>
          <div className="wrap">
            <div className="sec-head reveal">
              <span className="eyebrow">By department</span>
              <h2>Research &amp; thrust areas</h2>
              <p>Each department brings its own focus — from artificial intelligence and data science to the mechanical and chemical processing of textiles.</p>
            </div>
            <div className="tcards">
              {THRUST.map(t=>(
                <div className="tcard reveal" key={t.code}>
                  <span className="code">DEPT · {t.code}</span>
                  <h3>{t.name}</h3>
                  <div className="taglist">{t.areas.map((a,i)=><span className="tag" key={i}>{a}</span>)}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section className="issues" id="issues">
          <div className="wrap">
            <div className="sec-head reveal">
              <span className="eyebrow">Newsletter</span>
              <h2>Research News issues</h2>
              <p>The institute's research newsletter — open the latest issue below.</p>
            </div>
            {ISSUES.length>0 ? (
              <div className="feed-list">
                {ISSUES.map((it,i)=>(
                  <a className="frow reveal" key={i} href={it.url} target="_blank" rel="noopener">
                    <span className="ficon">{(it.kind||"PDF").toUpperCase().slice(0,3)}</span>
                    <span className="fmeta"><span className="t">{it.title}</span><span className="d">{it.year}</span></span>
                    <span className="fopen">{Ico.open()} Open</span>
                  </a>
                ))}
              </div>
            ) : (
              <div className="state"><b>No issues published yet</b>New research newsletters will appear here.</div>
            )}
          </div>
        </section>
      </main>
      <Footer/>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
