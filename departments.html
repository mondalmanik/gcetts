<style>
:root{
  --indigo-950:#0E1B33;--indigo-900:#14233F;--indigo-800:#1B2E50;--indigo-700:#243B65;--indigo-600:#2C4878;
  --thread:#6E8BBE;--ecru:#F4EFE4;--paper:#FBF9F4;--paper-dim:#F1ECE0;--gold:#D8A33B;--gold-deep:#B9842A;
  --ink:#1A1A17;--ink-soft:#56524A;--line:#E2DBCC;--max:1200px;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
ul{list-style:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}
.wrap{max-width:var(--max);margin:0 auto;padding:0 20px}
.mono{font-family:'Spline Sans Mono',monospace}
.eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:500;display:inline-flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.eyebrow.on-dark{color:var(--gold)}
.skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:#fff;padding:12px 18px;border-radius:0 0 8px 0}
.skip:focus{left:0}

/* topbar + header (shared) */
.topbar{background:var(--indigo-950);color:#cfd8ea;font-size:.78rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;min-height:38px;flex-wrap:wrap}
.topbar .tb-left{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.topbar a{display:inline-flex;gap:6px;align-items:center;opacity:.85;transition:opacity .2s}
.topbar a:hover{opacity:1;color:var(--gold)}
.topbar .pill{background:var(--gold);color:var(--indigo-950);padding:3px 11px;border-radius:999px;font-weight:700;font-family:'Spline Sans Mono',monospace;letter-spacing:.04em}
.header{position:sticky;top:0;z-index:120;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:74px}
.brand{display:flex;align-items:center;gap:13px}
.crest{width:46px;height:46px;flex:0 0 auto}
.brand-logo{height:42px;width:auto;flex:0 0 auto;object-fit:contain}
@media(max-width:520px){.brand-logo{height:34px}}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:1.06rem;line-height:1.05;letter-spacing:-.01em;display:block;color:var(--indigo-900)}
.brand-txt span{font-family:'Spline Sans Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
.navlinks{display:none;align-items:center;gap:4px}
.navlinks a{font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;color:var(--ink);transition:background .2s,color .2s}
.navlinks a:hover,.navlinks a.active{background:var(--ecru);color:var(--indigo-800)}
.nav-cta{display:none;background:var(--indigo-800);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.84rem;transition:background .2s,transform .2s}
.nav-cta:hover{background:var(--gold);color:var(--indigo-950);transform:translateY(-1px)}
.nav-dd{position:relative}
.nav-dd-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--ink);cursor:pointer;transition:background .2s,color .2s}
.nav-dd:hover .nav-dd-btn,.nav-dd:focus-within .nav-dd-btn{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-btn svg{transition:transform .2s}
.nav-dd:hover .nav-dd-btn svg,.nav-dd:focus-within .nav-dd-btn svg{transform:rotate(180deg)}
.nav-dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:260px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 18px 44px -16px rgba(20,35,63,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s;z-index:50}
.nav-dd:hover .nav-dd-menu,.nav-dd:focus-within .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-menu a{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:500;color:var(--ink);white-space:nowrap}
.nav-dd-menu a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-menu .ext{color:var(--gold-deep);font-size:.8rem}
.burger{display:inline-flex;flex-direction:column;gap:5px;background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer}
.burger span{width:20px;height:2px;background:var(--indigo-900);border-radius:2px;transition:.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:1024px){.navlinks{display:flex}.nav-cta{display:inline-block}.burger{display:none}}
.drawer{overflow:hidden;max-height:0;transition:max-height .35s ease;background:var(--paper);border-bottom:1px solid var(--line)}
.drawer.open{max-height:640px;overflow-y:auto}
.drawer ul{padding:8px 20px 22px}
.drawer a{display:block;padding:13px 6px;font-weight:600;border-bottom:1px solid var(--line);color:var(--ink)}
.drawer .sub a{padding-left:22px;font-weight:500;color:var(--ink-soft);font-size:.92rem}
.drawer .d-cta{margin-top:16px;text-align:center;background:var(--indigo-800);color:#fff;border-radius:999px;border:none}
.acc-btn{display:flex;width:100%;justify-content:space-between;align-items:center;padding:13px 6px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);font-family:inherit;font-size:1rem;color:var(--ink);cursor:pointer}
.acc-btn span{font-family:'Spline Sans Mono',monospace;color:var(--gold-deep);font-size:1.2rem;width:20px;text-align:center}

/* hero */
.dhero{position:relative;background:var(--indigo-900);color:#fff;overflow:hidden;padding:56px 0 60px}
.dhero .weave-bg{position:absolute;inset:0;opacity:.42}
.dhero .glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(216,163,59,.18),transparent 65%);top:-220px;right:-120px}
.dhero .wrap{position:relative}
.crumb{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0;margin-bottom:16px}
.crumb a:hover{color:var(--gold)}
.dhero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.1rem,5.2vw,3.5rem);line-height:1.04;letter-spacing:-.02em;margin-top:4px}
.dhero h1 em{font-style:italic;color:var(--gold)}
.dhero .lead{color:#c7d2e8;max-width:60ch;margin-top:16px;font-size:1.06rem}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
.dchip{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 14px;font-size:.82rem;color:#dbe4f5}
.dchip b{color:#fff;font-family:'Spline Sans Mono',monospace;font-size:.74rem;letter-spacing:.04em}
.dchip .g{color:var(--gold)}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 22px;border-radius:999px;font-weight:700;font-size:.9rem;transition:transform .2s,background .2s;cursor:pointer;border:none}
.btn-gold{background:var(--gold);color:var(--indigo-950)}
.btn-gold:hover{transform:translateY(-2px);background:#e6b34d}
.btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

/* body layout */
.dbody{padding:56px 0 70px}
.dgrid{display:grid;gap:40px}
@media(min-width:940px){.dgrid{grid-template-columns:1fr 320px;align-items:start}}
.prose h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.4rem,3vw,1.9rem);color:var(--indigo-900);letter-spacing:-.01em;margin:0 0 14px}
.prose p{color:var(--ink-soft);margin-bottom:15px;font-size:1.04rem}
.prose .lead{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--ink);line-height:1.45}
.block{margin-top:38px}
.rule{height:1px;background:repeating-linear-gradient(90deg,var(--gold) 0 2px,transparent 2px 9px);opacity:.45;margin:0 0 22px}

/* programme cards */
.progs{display:grid;gap:12px}
.prog{border:1px solid var(--line);border-radius:12px;padding:18px 20px;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:14px}
.prog .pt{font-family:'Fraunces',serif;font-weight:600;color:var(--indigo-900);font-size:1.05rem}
.prog .pl{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap}
.prog .badge{font-family:'Spline Sans Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);background:rgba(216,163,59,.16);padding:3px 9px;border-radius:999px;white-space:nowrap}

/* tag chips */
.taglist{display:flex;flex-wrap:wrap;gap:9px}
.tag{background:var(--ecru);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:.85rem;font-weight:600;color:var(--indigo-800)}

/* labs / lists */
.flist{display:grid;gap:10px}
.flist li{position:relative;padding-left:26px;color:var(--ink-soft)}
.flist li::before{content:"";position:absolute;left:0;top:9px;width:11px;height:11px;background:var(--gold);border-radius:2px;transform:rotate(45deg)}

/* recruiters */
.recruiters{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.rec{font-family:'Spline Sans Mono',monospace;font-size:.78rem;font-weight:600;color:var(--indigo-900);background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px}

/* sidebar */
.side{position:sticky;top:96px;display:flex;flex-direction:column;gap:16px}
.facts{background:var(--indigo-900);color:#fff;border-radius:18px;padding:24px;overflow:hidden;position:relative}
.facts h3{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.fact{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px dashed rgba(255,255,255,.14);font-size:.9rem}
.fact:last-child{border-bottom:none}
.fact span{color:#aebbd6}
.fact b{font-family:'Fraunces',serif;font-weight:600;text-align:right}
.reslinks{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px}
.reslinks h3{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
.reslinks a{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 4px;border-bottom:1px solid var(--line);font-size:.9rem;font-weight:600;color:var(--indigo-900)}
.reslinks a:last-child{border-bottom:none}
.reslinks a:hover{color:var(--gold-deep)}
.reslinks a .ar{color:var(--gold-deep)}

/* dept switch nav */
.deptnav{display:flex;justify-content:space-between;gap:12px;margin-top:48px;flex-wrap:wrap}
.deptnav a{flex:1;min-width:220px;border:1px solid var(--line);border-radius:14px;padding:18px 20px;background:#fff;transition:.2s}
.deptnav a:hover{border-color:var(--gold);transform:translateY(-3px)}
.deptnav .lab{font-family:'Spline Sans Mono',monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
.deptnav .nm{font-family:'Fraunces',serif;font-weight:600;color:var(--indigo-900);font-size:1.05rem;margin-top:4px}
.deptnav .next{text-align:right}

/* landing grid */
.landing{padding:48px 0 70px}
.dcards{display:grid;gap:18px}
@media(min-width:640px){.dcards{grid-template-columns:1fr 1fr}}
.dcard{background:linear-gradient(165deg,#fff,var(--paper-dim));border:1px solid var(--line);border-radius:16px;padding:28px;transition:transform .25s,border-color .25s;display:flex;flex-direction:column;min-height:210px}
.dcard:hover{transform:translateY(-5px);border-color:var(--gold)}
.dcard .code{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;color:var(--gold-deep);font-weight:600}
.dcard h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;margin:12px 0 10px;color:var(--indigo-900);line-height:1.12}
.dcard p{color:var(--ink-soft);font-size:.94rem;flex-grow:1}
.dcard .foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.dcard .lvl{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase}
.dcard .go{color:var(--gold-deep);font-weight:700;font-size:.84rem;display:inline-flex;gap:6px;align-items:center;transition:gap .2s}
.dcard:hover .go{gap:11px}

/* footer */
.footer{background:var(--indigo-950);color:#aebbd6;padding:60px 0 0}
.foot-top{display:grid;gap:34px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.1)}
.foot-brand .brand-txt b{color:#fff}
.foot-brand p{margin-top:16px;font-size:.9rem;max-width:34ch}
.foot-col h4{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.foot-col a{display:block;padding:6px 0;font-size:.9rem;transition:color .2s}
.foot-col a:hover{color:#fff}
.foot-bottom{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:24px 0;font-size:.8rem;color:#7e8db0}
@media(min-width:760px){.foot-top{grid-template-columns:1.6fr 1fr 1fr 1fr}}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
</style>

function Dropdown({label, items}){return(

        <ul>

function useReveal(dep){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){els.forEach(e=>e.classList.add('in'));return;}
    const io=new IntersectionObserver(en=>en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.06});
    els.forEach(e=>io.observe(e));return ()=>io.disconnect();
  },[dep]);
}

function Detail({code}){
  const d=DEPTS[code];
  useReveal(code);
  useEffect(()=>{ document.title = "Department of "+d.name+" · GCETTS"; window.scrollTo({top:0,behavior:"auto"}); },[code]);
  const i=ORDER.indexOf(code);
  const prev=DEPTS[ORDER[(i-1+ORDER.length)%ORDER.length]];
  const next=DEPTS[ORDER[(i+1)%ORDER.length]];
  const prevId=ORDER[(i-1+ORDER.length)%ORDER.length];
  const nextId=ORDER[(i+1)%ORDER.length];
  const pg = d.programmes.length;
  return (
    <React.Fragment>
      <section className="dhero">
        <Weave opacity={.4}/><div className="glow"></div>
        <div className="wrap">
          <div className="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; <a href="departments.html">Departments</a> &nbsp;/&nbsp; {d.code}</div>

          <h1>Department of <em>{d.name}</em>.</h1>
          <p className="lead">{d.tagline}</p>
          <div className="chips">
            <span className="dchip"><span className="g">Est.</span> <b>{d.est}</b></span>
            <span className="dchip">Annual intake <b>{d.intake}</b></span>
            <span className="dchip">Faculty <b>{d.faculty}</b></span>
            <span className="dchip"><b>AICTE</b> approved</span>
            <span className="dchip">Affiliated to <b>MAKAUT</b></span>
          </div>
          <div className="hero-cta">
            <a className="btn btn-gold" href="https://drive.google.com/file/d/1Vf__yZqNDXnj7tXz9Ue7HqfpBkcwgKub/view?usp=sharing" target="_blank" rel="noopener">Prospectus {Ico.arrow()}</a>
            <a className="btn btn-ghost" href="faculty.html">Department Faculty</a>
          </div>
        </div>
      </section>

      <main className="dbody" id="main">
        <div className="wrap">
          <div className="dgrid">
            <div className="prose reveal">
              <h2>Overview</h2>
              {d.intro.map((p,idx)=><p key={idx} className={p.lead?"lead":""}>{p.t}</p>)}

              <div className="block">
                <h2>Programmes</h2>
                <div className="rule"></div>
                <div className="progs">
                  {d.programmes.map((p,idx)=>(
                    <div className="prog" key={idx}>
                      <div><div className="pt">{p.t}</div><div className="pl">{p.l}</div></div>
                      <span className="badge">{p.b}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="block">
                <h2>{d.focusTitle}</h2>
                <div className="rule"></div>
                <div className="taglist">{d.focus.map((f,idx)=><span className="tag" key={idx}>{f}</span>)}</div>
              </div>

              <div className="block">
                <h2>Laboratories &amp; facilities</h2>
                <div className="rule"></div>
                <ul className="flist">{d.labs.map((l,idx)=><li key={idx}>{l}</li>)}</ul>
                {d.labsNote && <p style={{marginTop:"14px",fontSize:".92rem",color:"var(--ink-soft)"}}>{d.labsNote}</p>}
              </div>

              <div className="block">
                <h2>Placements &amp; industry</h2>
                <div className="rule"></div>
                <p style={{color:"var(--ink-soft)"}}>{d.placement}</p>
                {d.recruiters && <div className="recruiters">{d.recruiters.map((r,idx)=><span className="rec" key={idx}>{r}</span>)}</div>}
              </div>
            </div>

            <aside className="side reveal">
              <div className="facts">
                <Weave opacity={.25}/>
                <div style={{position:"relative"}}>
                  <h3>Quick facts</h3>
                  <div className="fact"><span>Established</span><b>{d.est}</b></div>
                  <div className="fact"><span>Programmes</span><b>{pg===1?"B.Tech":"B.Tech + M.Tech"}</b></div>
                  <div className="fact"><span>Annual intake</span><b>{d.intake} (B.Tech)</b></div>
                  <div className="fact"><span>Faculty members</span><b>{d.faculty}</b></div>
                  <div className="fact"><span>Approval</span><b>AICTE</b></div>
                  <div className="fact"><span>Affiliation</span><b>MAKAUT</b></div>
                </div>
              </div>
              <div className="reslinks">
                <h3>Department resources</h3>
                {RES_LINKS.map(r=>(
                  <a key={r.label} href={r.href} target={r.ext?"_blank":undefined} rel={r.ext?"noopener":undefined}>

                  </a>
                ))}
              </div>
            </aside>
          </div>

          <nav className="deptnav" aria-label="Other departments">
            <a href={"departments.html?d="+prevId}><div className="lab">← Previous</div><div className="nm">{prev.code} — {prev.name}</div></a>
            <a className="next" href={"departments.html?d="+nextId}><div className="lab">Next →</div><div className="nm">{next.code} — {next.name}</div></a>
          </nav>
        </div>
      </main>
    </React.Fragment>
  );
}

function Landing(){
  useReveal("landing");
  useEffect(()=>{ document.title="Departments · GCETTS"; },[]);
  return (
    <React.Fragment>
      <section className="dhero">
        <Weave opacity={.4}/><div className="glow"></div>
        <div className="wrap">
          <div className="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Departments</div>
          <span className="eyebrow on-dark">Academics</span>
          <h1>Four disciplines, <em>one fabric</em>.</h1>
          <p className="lead">Undergraduate and postgraduate programmes spanning computing, textiles and apparel — each approved by the All India Council for Technical Education and affiliated to MAKAUT.</p>
        </div>
      </section>
      <main className="landing" id="main">
        <div className="wrap">
          <div className="dcards">
            {ORDER.map(code=>{const d=DEPTS[code];const pg=d.programmes.length;return(
              <a className="dcard reveal" key={code} href={"departments.html?d="+code}>
                <span className="code">DEPT · {d.code}</span>
                <h3>{d.name}</h3>
                <p>{d.tagline}</p>
                <div className="foot">
                  <span className="lvl">{pg>1?"B.Tech · M.Tech":"B.Tech"} · Est. {d.since}</span>
                  <span className="go">Explore {Ico.arrow()}</span>
                </div>
              </a>
            );})}

        </div>
      </main>
    </React.Fragment>
  );
}

function App(){
  const params=new URLSearchParams(location.search);
  let code=(params.get("d")||location.hash.replace("#","")||"").toLowerCase();
  if(!DEPTS[code]) code=null;
  return (
    <React.Fragment>
      <a className="skip" href="#main">Skip to content</a>
      <Header/>
      {code ? <Detail code={code}/> : <Landing/>}
      <Footer/>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
