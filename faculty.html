<style>
:root{
  --indigo-950:#0E1B33;--indigo-900:#14233F;--indigo-800:#1B2E50;--indigo-700:#243B65;--indigo-600:#2C4878;
  --thread:#6E8BBE;--ecru:#F4EFE4;--paper:#FBF9F4;--paper-dim:#F1ECE0;--gold:#D8A33B;--gold-deep:#B9842A;
  --ink:#1A1A17;--ink-soft:#56524A;--line:#E2DBCC;--max:1200px;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
ul{list-style:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}
.wrap{max-width:var(--max);margin:0 auto;padding:0 20px}
.mono{font-family:'Spline Sans Mono',monospace}
.eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep);font-weight:500;display:inline-flex;align-items:center;gap:.6em}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.eyebrow.on-dark{color:var(--gold)}
.skip{position:absolute;left:-999px;top:0;z-index:200;background:var(--ink);color:#fff;padding:12px 18px;border-radius:0 0 8px 0}
.skip:focus{left:0}

/* topbar + header (shared with index) */
.topbar{background:var(--indigo-950);color:#cfd8ea;font-size:.78rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;min-height:38px;flex-wrap:wrap}
.topbar .tb-left{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.topbar a{display:inline-flex;gap:6px;align-items:center;opacity:.85;transition:opacity .2s}
.topbar a:hover{opacity:1;color:var(--gold)}
.topbar .pill{background:var(--gold);color:var(--indigo-950);padding:3px 11px;border-radius:999px;font-weight:700;font-family:'Spline Sans Mono',monospace;letter-spacing:.04em}
.header{position:sticky;top:0;z-index:120;background:rgba(251,249,244,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:74px}
.brand{display:flex;align-items:center;gap:13px}
.crest{width:46px;height:46px;flex:0 0 auto}
.brand-logo{height:42px;width:auto;flex:0 0 auto;object-fit:contain}
@media(max-width:520px){.brand-logo{height:34px}}
.brand-txt b{font-family:'Fraunces',serif;font-weight:600;font-size:1.06rem;line-height:1.05;letter-spacing:-.01em;display:block;color:var(--indigo-900)}
.brand-txt span{font-family:'Spline Sans Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
.navlinks{display:none;align-items:center;gap:4px}
.navlinks a{font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;color:var(--ink);transition:background .2s,color .2s}
.navlinks a:hover,.navlinks a.active{background:var(--ecru);color:var(--indigo-800)}
.nav-cta{display:none;background:var(--indigo-800);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:.84rem;transition:background .2s,transform .2s}
.nav-cta:hover{background:var(--gold);color:var(--indigo-950);transform:translateY(-1px)}
.nav-dd{position:relative}
.nav-dd-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:.86rem;font-weight:600;padding:9px 12px;border-radius:8px;background:none;border:none;color:var(--ink);cursor:pointer;transition:background .2s,color .2s}
.nav-dd:hover .nav-dd-btn,.nav-dd:focus-within .nav-dd-btn{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-btn svg{transition:transform .2s}
.nav-dd:hover .nav-dd-btn svg,.nav-dd:focus-within .nav-dd-btn svg{transform:rotate(180deg)}
.nav-dd-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:248px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 18px 44px -16px rgba(20,35,63,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s;z-index:50}
.nav-dd:hover .nav-dd-menu,.nav-dd:focus-within .nav-dd-menu{opacity:1;visibility:visible;transform:none}
.nav-dd-menu a{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.86rem;font-weight:500;color:var(--ink);white-space:nowrap}
.nav-dd-menu a:hover{background:var(--ecru);color:var(--indigo-800)}
.nav-dd-menu a.dd-head{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;border-bottom:1px solid var(--line);border-radius:0;margin-bottom:4px}
.nav-dd-menu .ext{color:var(--gold-deep);font-size:.8rem}
.burger{display:inline-flex;flex-direction:column;gap:5px;background:none;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer}
.burger span{width:20px;height:2px;background:var(--indigo-900);border-radius:2px;transition:.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:1024px){.navlinks{display:flex}.nav-cta{display:inline-block}.burger{display:none}}
.drawer{overflow:hidden;max-height:0;transition:max-height .35s ease;background:var(--paper);border-bottom:1px solid var(--line)}
.drawer.open{max-height:640px;overflow-y:auto}
.drawer ul{padding:8px 20px 22px}
.drawer a{display:block;padding:13px 6px;font-weight:600;border-bottom:1px solid var(--line);color:var(--ink)}
.drawer .sub a{padding-left:22px;font-weight:500;color:var(--ink-soft);font-size:.92rem}
.drawer .d-cta{margin-top:16px;text-align:center;background:var(--indigo-800);color:#fff;border-radius:999px;border:none}
.acc-btn{display:flex;width:100%;justify-content:space-between;align-items:center;padding:13px 6px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);font-family:inherit;font-size:1rem;color:var(--ink);cursor:pointer}
.acc-btn span{font-family:'Spline Sans Mono',monospace;color:var(--gold-deep);font-size:1.2rem;width:20px;text-align:center}

/* ===== faculty hero ===== */
.fhero{position:relative;background:var(--indigo-900);color:#fff;overflow:hidden;padding:58px 0 66px}
.fhero .weave-bg{position:absolute;inset:0;opacity:.45}
.fhero .glow{position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(216,163,59,.18),transparent 65%);top:-200px;right:-100px}
.fhero .wrap{position:relative}
.crumb{font-family:'Spline Sans Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0;margin-bottom:18px}
.crumb a:hover{color:var(--gold)}
.fhero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.3rem,6vw,4rem);line-height:1.03;letter-spacing:-.02em;margin-top:6px}
.fhero h1 em{font-style:italic;color:var(--gold)}
.fhero p{color:#c7d2e8;max-width:54ch;margin-top:18px;font-size:1.05rem}
.fhero-stats{display:flex;gap:30px;flex-wrap:wrap;margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.14)}
.fhero-stats div b{font-family:'Fraunces',serif;font-size:1.7rem;display:block}
.fhero-stats div span{font-family:'Spline Sans Mono',monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:#9fb0d0}

/* ===== controls ===== */
.controls{position:sticky;top:74px;z-index:40;background:rgba(251,249,244,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 0}
.controls .wrap{display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.search{position:relative;flex:1;min-width:220px;max-width:380px}
.search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--line);border-radius:999px;background:#fff;font-family:inherit;font-size:.92rem;color:var(--ink)}
.search input:focus{outline:none;border-color:var(--gold)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-family:'Hanken Grotesk',sans-serif;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.2s;white-space:nowrap}
.chip:hover{border-color:var(--gold)}
.chip.on{background:var(--indigo-800);color:#fff;border-color:var(--indigo-800)}

/* ===== directory ===== */
.dir{padding:50px 0 70px}
.dept-block{margin-bottom:52px;scroll-margin-top:160px}
.dept-block:last-child{margin-bottom:0}
.dept-head{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.dept-head .num{font-family:'Spline Sans Mono',monospace;font-size:.72rem;color:var(--gold-deep);font-weight:600;letter-spacing:.1em}
.dept-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.5rem,3.4vw,2.1rem);color:var(--indigo-900);letter-spacing:-.01em;white-space:nowrap}
.dept-head .rule{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--gold) 0 2px,transparent 2px 9px);opacity:.45}
.dept-head .count{font-family:'Spline Sans Mono',monospace;font-size:.72rem;color:var(--ink-soft);white-space:nowrap}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:920px){.grid{grid-template-columns:1fr 1fr 1fr}}

.fcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column;transition:transform .22s,border-color .22s,box-shadow .22s;position:relative;overflow:hidden}
.fcard:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 18px 40px -22px rgba(20,35,63,.4)}
.fcard .top{display:flex;gap:14px;align-items:center}
.avatar{width:62px;height:62px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.avatar .ini{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;color:#fff;letter-spacing:.02em}
.fcard h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.12rem;line-height:1.15;color:var(--indigo-900)}
.fcard .role{font-size:.82rem;color:var(--ink-soft);margin-top:3px}
.badge{display:inline-block;margin-top:7px;font-family:'Spline Sans Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:3px 8px;border-radius:999px;background:rgba(216,163,59,.16);color:var(--gold-deep)}
.fcard .foot{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.fcard .foot a{font-size:.83rem;display:inline-flex;align-items:center;gap:8px;color:var(--ink-soft);word-break:break-all}
.fcard .foot a:hover{color:var(--gold-deep)}
.fcard .foot a.profile{color:var(--indigo-700);font-weight:600}
.fcard .foot a svg{flex:0 0 auto}
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty b{font-family:'Fraunces',serif;font-size:1.3rem;color:var(--indigo-900);display:block;margin-bottom:8px}

/* footer (shared) */
.footer{background:var(--indigo-950);color:#aebbd6;padding:60px 0 0}
.foot-top{display:grid;gap:34px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.1)}
.foot-brand .brand-txt b{color:#fff}
.foot-brand p{margin-top:16px;font-size:.9rem;max-width:34ch}
.foot-col h4{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.foot-col a{display:block;padding:6px 0;font-size:.9rem;transition:color .2s}
.foot-col a:hover{color:#fff}
.foot-bottom{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:24px 0;font-size:.8rem;color:#7e8db0}
@media(min-width:760px){.foot-top{grid-template-columns:1.6fr 1fr 1fr 1fr}}

.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
</style>

      <path d="M32 12l3 5h-6l3-5z" fill="#D8A33B"/>
    </svg>
  );
}
function Weave({opacity}){
  return (
    <svg className="weave-bg" preserveAspectRatio="none" viewBox="0 0 800 600" aria-hidden="true" style={{opacity}}>
      <defs><pattern id="fw" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M0 0 H40 M0 13 H40 M0 26 H40" stroke="rgba(110,139,190,.5)" strokeWidth="1"/>
        <path d="M0 0 V40 M13 0 V40 M26 0 V40" stroke="rgba(216,163,59,.28)" strokeWidth="1"/>
      </pattern></defs>
      <rect width="800" height="600" fill="url(#fw)"/>
    </svg>
  );
}
function Dropdown({label, items}){
  return (
    <div className="nav-dd">
      <button className="nav-dd-btn" aria-haspopup="true">{label}
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <div className="nav-dd-menu" role="menu">
        {items.map(it=>(
          <a key={it.label} href={it.href} role="menuitem" target={it.ext?"_blank":undefined} rel={it.ext?"noopener":undefined}>{it.label}{it.ext && <span className="ext">↗</span>}</a>
        ))}
      </div>
    </div>
  );
}

          {acc==='dept' && <li className="sub">{DEPT_LINKS.map(d=><a key={d.label} href={d.href} target={d.ext?"_blank":undefined} rel={d.ext?"noopener":undefined}>{d.label}</a>)}</li>}

const RESP_LOCAL = (typeof window!=="undefined" && !!window.GALLERY_RESPONSIVE_LOCAL);
function localSrcset(path){
  const mm = path && path.match(/^(.*)\.(jpe?g|png|webp)$/i);
  return (RESP_LOCAL && mm) ? `${mm[1]}-124.${mm[2]} 124w, ${mm[1]}-248.${mm[2]} 248w` : undefined;
}
function Avatar({m}){
  const srcs=[m.photo, m.photoRemote].filter(Boolean);
  const [i,setI]=useState(0);
  const [c1,c2]=hueOf(m.name);
  const src=srcs[i];
  const isLocal = i===0 && /^assets\//.test(src||"");
  return (
    <div className="avatar" style={{background:`linear-gradient(145deg,${c1},${c2})`}} aria-hidden="true">
      {src
        ? <img src={src} srcSet={isLocal?localSrcset(src):undefined} sizes="62px" alt="" loading="lazy" decoding="async" referrerPolicy="no-referrer" onError={()=>setI(i+1)} />
        : <span className="ini">{initials(m.name)}</span>}
    </div>
  );
}

function Card({m}){
  return (
    <article className="fcard reveal">
      <div className="top">
        <Avatar m={m}/>
        <div>
          <h3>{m.name}</h3>
          <div className="role">{m.role}</div>
          {isLead(m.role) && <span className="badge">{/HOD/i.test(m.role)?"Head of Dept.":/Officer-in-Charge/i.test(m.role)?"Officer-in-Charge":/Placement/i.test(m.role)?"Training & Placement":"Librarian"}</span>}
        </div>
      </div>
      <div className="foot">
        <a href={"mailto:"+m.email}>{Ico.mail()} {m.email}</a>
        {m.profile && <a className="profile" href={m.profile} target="_blank" rel="noopener">{Ico.doc()} View detailed profile ↗</a>}
      </div>
    </article>
  );
}

function App(){
  const [q,setQ]=useState("");
  const [active,setActive]=useState("All");
  const depts=["All",...FACULTY.map(d=>d.dept)];

  const filtered=useMemo(()=>{
    const term=q.trim().toLowerCase();
    return FACULTY
      .filter(d=>active==="All"||d.dept===active)
      .map(d=>({...d,members:d.members.filter(m=>!term||m.name.toLowerCase().includes(term)||m.role.toLowerCase().includes(term))}))
      .filter(d=>d.members.length>0);
  },[q,active]);

  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){els.forEach(e=>e.classList.add('in'));return;}
    const io=new IntersectionObserver(en=>en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});
    els.forEach(e=>io.observe(e));return ()=>io.disconnect();
  },[filtered]);

  const shown=filtered.reduce((a,d)=>a+d.members.length,0);

  return (
    <React.Fragment>
      <a className="skip" href="#dir">Skip to faculty</a>
      <Header/>
      <section className="fhero">
        <Weave opacity={.4}/>
        <div className="glow"></div>
        <div className="wrap">
          <div className="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Faculty</div>
          <h1>The people who <em>weave</em> it together.</h1>
          <p>Meet the teachers, researchers and mentors of GCETTS — across Basic Engineering, Basic Sciences, Computer Science &amp; Engineering, Information Technology, Textile Technology and the Library.</p>
          <div className="fhero-stats">
            <div><b>{TOTAL}</b><span>Faculty &amp; Staff</span></div>
            <div><b>{FACULTY.length}</b><span>Academic Units</span></div>
            <div><b>1908</b><span>Teaching Since</span></div>
          </div>
        </div>
      </section>

      <div className="controls">
        <div className="wrap">
          <div className="search">
            {Ico.search()}
            <input type="search" placeholder="Search by name or designation…" value={q} onChange={e=>setQ(e.target.value)} aria-label="Search faculty"/>
          </div>
          <div className="chips" role="tablist" aria-label="Filter by department">
            {depts.map(d=>(
              <button key={d} className={"chip"+(active===d?" on":"")} aria-pressed={active===d} onClick={()=>setActive(d)}>
                {d==="All"?"All Departments":(FACULTY.find(x=>x.dept===d)||{}).short||d}
              </button>
            ))}
          </div>
        </div>
      </div>

      <main className="dir" id="dir">
        <div className="wrap">
          {filtered.length===0 ? (
            <div className="empty"><b>No matches found</b>Try a different name, designation or department filter.</div>
          ) : filtered.map((d,i)=>(
            <section className="dept-block" key={d.dept}>
              <div className="dept-head">
                <span className="num">{String(i+1).padStart(2,'0')}</span>
                <h2>{d.dept}</h2>
                <span className="rule"></span>
                <span className="count">{d.members.length} {d.members.length===1?"member":"members"}</span>
              </div>
              <div className="grid">
                {d.members.map(m=><Card key={m.name} m={m}/>)}
              </div>
            </section>
          ))}
          {filtered.length>0 && <p className="mono" style={{marginTop:"40px",fontSize:".8rem",color:"var(--ink-soft)"}}>Showing {shown} of {TOTAL} listed members. Source: gcetts.ac.in/faculty.</p>}
        </div>
      </main>

      <footer className="footer"><div className="wrap">
        <div className="foot-top">
          <div className="foot-brand">
            <div className="brand"><Crest/><span className="brand-txt"><b style={{color:"#fff"}}>GCETTS</b><span>Serampore · Est. 1908</span></span></div>
            <p>Government College of Engineering &amp; Textile Technology, Serampore. Affiliated to MAKAUT, approved by AICTE.</p>
          </div>
          <div className="foot-col"><h4>Academics</h4>
            <a href="departments.html?d=cse">Computer Science &amp; Engg.</a>
            <a href="departments.html?d=it">Information Technology</a>
            <a href="departments.html?d=tt">Textile Technology</a>
            <a href="departments.html?d=apm">Apparel Production Mgmt.</a>
            <a href="faculty.html">Faculty</a>
          </div>
          <div className="foot-col"><h4>Institute</h4>
            <a href="index.html#institute">About &amp; History</a>
            <a href="index.html#vision">Vision &amp; Mission</a>
            <a href="index.html#principal">Principal's Desk</a>
            <a href="contact.html">Contact</a>
          </div>
          <div className="foot-col"><h4>Resources</h4>
            <a href="notices.html#notices">Notices</a>
            <a href="https://drive.google.com/file/d/1BOHoAtYIDRr2wKsBuVjY6SV4sKOqBXTB/view?usp=sharing" target="_blank" rel="noopener">NIRF</a>
            <a href="https://drive.google.com/file/d/1KWXbm0YFWtOaYugpUSLzTMPNDcxwK43V/view?usp=sharing" target="_blank" rel="noopener">Anti-Ragging</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdkeo-BajebDNM2stkQoeycfOr7VeJg7p6dFdUEFU-qEcYaPw/viewform" target="_blank" rel="noopener">Grievance Redressal</a>
          </div>
        </div>
        <div className="foot-bottom">
          <span>© {new Date().getFullYear()} Government College of Engineering and Textile Technology, Serampore. All rights reserved.</span>
          <span className="mono">Serampore · Hooghly · West Bengal</span>
        </div>
      </div></footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
